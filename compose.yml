---
services:
  db:
    image: divyagorantla1708/libapp:dbimage
    ports:
      - "3306:3306"
    deploy:
      replicas: 1    
  auth_service:
    image: divyagorantla1708/libapp:authimage
    ports:
      - "5001:5001"
    deploy:
      replicas: 1
    depends_on:
      - db
  book_service:
    image: divyagorantla1708/libapp:bookimage
    ports:
      - "5002:5002"
    deploy:
      replicas: 1
    depends_on:
      - db
  borrow_service:
    image: divyagorantla1708/libapp:borrowimage
    ports:
      - "5003:5003"
    deploy:
      replicas: 1
    depends_on:
      - db
  app-service:
    image: divyagorantla1708/libapp:appimage
    ports:
      - "5000:5000"
    deploy:
      replicas: 1
    depends_on:
      - auth_service
      - book_service
      - borrow_service
