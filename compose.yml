---
services:
  db:
    container_name: db
    image: dbimage
    ports:
      - "3306:3306"
    deploy:
      replicas: 2
      
  auth_service:
    container_name: auth_service
    image: authimage
    ports:
      - "5001:5001"
    deploy:
      replicas: 1
    depends_on:
      - db
  book_service:
    container_name: book_service
    image: bookimage
    ports:
      - "5002:5002"
    deploy:
      replicas: 1
    depends_on:
      - db
  borrow_service:
    container_name: borrow_service
    image: borrowimage
    ports:
      - "5003:5003"
    deploy:
      replicas: 1
    depends_on:
      - db
  app_service:
    image: shaikmustafa/flm2026:appimage
    ports:
      - "5000:5000"
    deploy:
      replicas: 1
    depends_on:
      - auth_service
      - book_service
      - borrow_service
